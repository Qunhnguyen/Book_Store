<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Categories UI</title>
</head>
<body>
    <h1>Categories</h1>
    <ul>
        {% for category in categories %}
            <li>{{ category.name }}</li>
        {% empty %}
            <li>No categories found.</li>
        {% endfor %}
    </ul>
</body>
</html>
