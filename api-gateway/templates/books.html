<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Books UI</title>
</head>
<body>
    <h1>Books</h1>
    <ul>
        {% for book in books %}
            <li>{{ book.title }} - {{ book.price }}</li>
        {% empty %}
            <li>No books found.</li>
        {% endfor %}
    </ul>
</body>
</html>
